name: Release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Calculate and set version
        id: version
        run: |
          chmod +x scripts/ci-set-version.sh
          scripts/ci-set-version.sh
          echo "version=$(cat /tmp/frispeak_version.txt)" >> $GITHUB_OUTPUT

      - name: Show version
        run: echo "Building version ${{ steps.version.outputs.version }}"

      - name: Build archive
        run: |
          xcodebuild archive \
            -project FriSpeak.xcodeproj \
            -scheme FriSpeak \
            -configuration Release \
            -archivePath $PWD/build/FriSpeak.xcarchive \
            ARCHS=arm64 \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath $PWD/build/DerivedData

      - name: Export app
        run: |
          rm -rf build/export
          mkdir -p build/export
          cat > build/exportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>-</string>
            <key>teamID</key>
            <string>-</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath $PWD/build/FriSpeak.xcarchive \
            -exportOptionsPlist $PWD/build/exportOptions.plist \
            -exportPath $PWD/build/export

      - name: Package DMG
        run: |
          chmod +x scripts/ci-package-dmg.sh
          scripts/ci-package-dmg.sh "${{ steps.version.outputs.version }}"

      - name: Generate release notes
        run: |
          cat > build/release-notes.md << NOTES
          # FriSpeak ${{ steps.version.outputs.version }}

          ## Installation
          1. Download the DMG below
          2. Open it and drag **FriSpeak** to your **Applications** folder
          3. Launch FriSpeak from Applications

          ## ⚠️  Unsigned App Notice

          This build is not signed with an Apple Developer ID, so macOS Gatekeeper will block it on first launch. To open it anyway:

          **Option A — Right-click → Open (easiest)**
          - Right-click (or \`Ctrl\`+click) **FriSpeak.app** in Applications
          - Select **Open** from the context menu
          - Click **Open** in the dialog
          - You only need to do this once

          **Option B — Remove quarantine attribute**
          \`\`\`bash
          xattr -rd com.apple.quarantine /Applications/FriSpeak.app
          \`\`\`

          **Option C — System Settings**
          1. Open **System Settings → Privacy & Security**
          2. Scroll down to the **Security** section
          3. Find the message about FriSpeak being blocked
          4. Click **Open Anyway**

          ## What's New
          - Automated release build ${{ steps.version.outputs.version }}
          NOTES

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: FriSpeak ${{ steps.version.outputs.version }}
          body_path: build/release-notes.md
          files: build/FriSpeak.dmg
          fail_on_unmatched_text: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
